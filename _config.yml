title: "Deploying AI Agents on AWS with Pulumi and Amazon Bedrock AgentCore"
author: Engin Diri
description: "A hands-on workshop for deploying AI agents on AWS using Pulumi and Amazon Bedrock AgentCore"
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true
include:
  - "00-setup-and-orientation.md"
  - "01-hello-agent.md"
  - "02-your-first-agent.md"
  - "03-multi-agent-orchestration.md"
  - "04-full-stack-weather-agent.md"
  - "05-housekeeping.md"
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
exclude:
  - _site
  - .jekyll-cache
  - .sass-cache
  - vendor
  - .git
  - CLAUDE.md
  - GEMINI.md
  - AGENTS.md
  - 02-solution/typescript/node_modules
  - 03-solution/typescript/node_modules
  - 04-solution/typescript/node_modules
  - 02-solution/python/.venv
  - 03-solution/python/.venv
  - 04-solution/python/.venv
  - 02-solution/python/__pycache__
  - 03-solution/python/__pycache__
  - 04-solution/python/__pycache__
  - 01-solution/.venv
  - 01-solution/__pycache__
  - 02-solution/python/build
  - 02-solution/typescript/build
