<style>
  .lang-tabs {
    position: relative;
    margin: 1em 0;
    /* active accent: the link color (Pulumi violet), brightened in dark mode below */
    --lang-active: var(--pulumi-violet-700, #5a30c5);
  }
  .lang-tab-buttons {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--color-border-default, #d0d7de);
    margin-bottom: 0;
  }
  .lang-tab-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    color: var(--color-fg-muted, #656d76);
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
  }
  .lang-tab-btn svg {
    width: 1.15em;
    height: 1.15em;
    flex: none;
    fill: currentColor;
  }
  .lang-tab-btn:hover {
    color: var(--color-fg-default, #1f2328);
  }
  .lang-tab-btn.active {
    color: var(--lang-active);
    border-bottom-color: var(--lang-active);
  }
  @media (prefers-color-scheme: dark) {
    .lang-tabs { --lang-active: var(--pulumi-violet-500, #9077f3); }
  }
  [data-color-mode="dark"] .lang-tabs,
  [data-dark-theme] .lang-tabs { --lang-active: var(--pulumi-violet-500, #9077f3); }
  .lang-tab {
    display: none;
  }
  .lang-tab.active {
    display: block;
    padding-top: 16px;
  }
  .lang-tab > .highlight:first-child,
  .lang-tab > pre:first-child,
  .lang-tab > p:first-child {
    margin-top: 0;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var STORAGE_KEY = 'workshop-lang';
    var LABELS = { typescript: 'TypeScript', python: 'Python' };

    // Inline logos. Python uses currentColor so it turns green when active;
    // TypeScript is the familiar "TS" badge in its brand blue.
    var ICONS = {
      python:
        '<svg viewBox="0 0 24 24" aria-hidden="true">' +
        '<path d="M11.9 0c-1 0-1.95.08-2.79.23C6.64.66 6.2 1.6 6.2 3.32v2.27h5.8v.74H4.02c-1.73 0-3.24 1.04-3.71 3.02-.55 2.27-.57 3.68 0 6.05.42 1.76 1.43 3.02 3.16 3.02h1.99v-2.72c0-1.96 1.7-3.69 3.71-3.69h5.79c1.65 0 2.97-1.36 2.97-3.02V3.32c0-1.61-1.36-2.82-2.97-3.09C13.92.08 12.9 0 11.9 0zM8.76 1.78c.6 0 1.09.5 1.09 1.11 0 .61-.49 1.1-1.09 1.1-.61 0-1.09-.49-1.09-1.1 0-.61.48-1.11 1.09-1.11z"/>' +
        '<path d="M18.79 6.33v2.64c0 2.05-1.74 3.77-3.71 3.77H9.29c-1.62 0-2.97 1.39-2.97 3.02v5.66c0 1.61 1.4 2.56 2.97 3.02 1.88.55 3.68.65 5.79 0 1.5-.43 2.97-1.31 2.97-3.02v-2.27h-5.79v-.74h8.68c1.73 0 2.38-1.21 2.98-3.02.62-1.87.6-3.66 0-6.05-.43-1.72-1.25-3.02-2.98-3.02h-2.15zM15.24 19.91c.61 0 1.09.49 1.09 1.1 0 .61-.48 1.11-1.09 1.11-.6 0-1.09-.5-1.09-1.11 0-.61.49-1.1 1.09-1.1z"/>' +
        '</svg>',
      typescript:
        // Official TS mark (fill=currentColor): grey when inactive, green when active.
        '<svg viewBox="0 0 24 24" aria-hidden="true">' +
        '<path fill="currentColor" d="M0 12v12h24V0H0zm19.341-.956c.61.152 1.074.423 1.501.865.221.236.549.666.575.77.008.03-1.036.73-1.668 1.123-.023.015-.115-.084-.217-.236-.31-.45-.633-.644-1.128-.678-.728-.05-1.196.331-1.192.967a.88.88 0 00.102.45c.16.331.458.53 1.39.933 1.719.74 2.454 1.227 2.911 1.92.509.773.625 2.008.278 2.926-.38 1.023-1.325 1.716-2.655 1.95-.41.073-1.382.062-1.828-.018-.964-.172-1.878-.648-2.442-1.273-.221-.243-.652-.88-.625-.925.011-.016.11-.077.22-.141l.89-.514.69-.4.145.213c.201.31.643.731.91.872.766.404 1.817.347 2.335-.118a.883.883 0 00.313-.72c0-.278-.035-.4-.18-.61-.186-.266-.567-.49-1.649-.96-1.238-.533-1.771-.864-2.259-1.39a3.165 3.165 0 01-.659-1.2c-.091-.364-.114-1.27-.042-1.635.31-1.554 1.534-2.64 3.202-2.84.434-.05 1.443-.01 1.872.074zm-5.66 1.077l.007.983H10.15v8.876H7.787V12.104H4.25v-.963c0-.534.011-.98.026-.99.012-.016 2.125-.023 4.694-.018l4.665.011z"/>' +
        '</svg>',
    };

    function getPreferredLang() {
      return localStorage.getItem(STORAGE_KEY) || 'typescript';
    }

    function setPreferredLang(lang) {
      localStorage.setItem(STORAGE_KEY, lang);
    }

    function activateTab(container, lang) {
      container.querySelectorAll('.lang-tab-btn').forEach(function (btn) {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      container.querySelectorAll('.lang-tab').forEach(function (panel) {
        panel.classList.toggle('active', panel.dataset.lang === lang);
      });
    }

    function activateAll(lang) {
      document.querySelectorAll('.lang-tabs').forEach(function (container) {
        activateTab(container, lang);
      });
      setPreferredLang(lang);
    }

    document.querySelectorAll('.lang-tabs').forEach(function (container) {
      var tabs = container.querySelectorAll('.lang-tab');
      if (tabs.length === 0) return;

      var btnBar = document.createElement('div');
      btnBar.className = 'lang-tab-buttons';

      tabs.forEach(function (tab) {
        var lang = tab.dataset.lang;
        var btn = document.createElement('button');
        btn.className = 'lang-tab-btn';
        btn.dataset.lang = lang;
        var label = LABELS[lang] || lang;
        btn.innerHTML = (ICONS[lang] || '') + '<span>' + label + '</span>';
        btn.setAttribute('aria-label', label);
        btn.addEventListener('click', function () { activateAll(lang); });
        btnBar.appendChild(btn);
      });

      container.insertBefore(btnBar, container.firstChild);
    });

    activateAll(getPreferredLang());
  });
</script>
