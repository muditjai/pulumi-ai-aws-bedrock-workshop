<!DOCTYPE html>
<html lang="en" data-color-mode="auto" data-light-theme="light" data-dark-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Primer/21.0.7/primer.css">
  <style>
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto;
      padding: 45px;
    }
    @media (max-width: 767px) {
      .markdown-body {
        padding: 15px;
      }
    }
    .site-header a {
      text-decoration: none;
      color: #6366f1;
    }
    .site-header a:hover {
      text-decoration: underline;
    }
    .site-header h1 {
      margin: 0;
      font-size: 2em;
    }
    .theme-toggle {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 100;
      background: var(--color-bg-default);
      border: 1px solid var(--color-border-default);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
    }

    /* Code blocks - shared */
    .highlight {
      border-radius: 6px;
      margin: 1rem 0;
      position: relative;
    }
    .highlight pre {
      margin: 0;
      padding: 16px;
      padding-top: 44px;
      overflow-x: auto;
      background: transparent;
    }
    .code-copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 2;
      border-radius: 6px;
      width: 32px;
      height: 32px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
    }

    /* Light mode syntax (GitHub style) */
    [data-color-mode="light"] .highlight,
    [data-light-theme="light"][data-color-mode="auto"] .highlight {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
    }
    [data-color-mode="light"] .code-copy-btn,
    [data-light-theme="light"][data-color-mode="auto"] .code-copy-btn {
      border: 1px solid #d0d7de;
      background: #ffffff;
      color: #1f2328;
    }
    [data-color-mode="light"] .code-copy-btn:hover,
    [data-light-theme="light"][data-color-mode="auto"] .code-copy-btn:hover {
      background: #f6f8fa;
    }
    [data-color-mode="light"] .code-copy-btn.copied,
    [data-light-theme="light"][data-color-mode="auto"] .code-copy-btn.copied {
      color: #1a7f37;
    }
    [data-color-mode="light"] .highlight .c, [data-color-mode="light"] .highlight .c1, [data-color-mode="light"] .highlight .cm, [data-color-mode="light"] .highlight .cp, [data-color-mode="light"] .highlight .cs {
      color: #6e7781; font-style: italic;
    }
    [data-color-mode="light"] .highlight .k, [data-color-mode="light"] .highlight .kd, [data-color-mode="light"] .highlight .kn, [data-color-mode="light"] .highlight .kp, [data-color-mode="light"] .highlight .kr, [data-color-mode="light"] .highlight .kt, [data-color-mode="light"] .highlight .kv {
      color: #cf222e;
    }
    [data-color-mode="light"] .highlight .kc, [data-color-mode="light"] .highlight .mf, [data-color-mode="light"] .highlight .mh, [data-color-mode="light"] .highlight .mi, [data-color-mode="light"] .highlight .mo, [data-color-mode="light"] .highlight .il {
      color: #0550ae;
    }
    [data-color-mode="light"] .highlight .s, [data-color-mode="light"] .highlight .sa, [data-color-mode="light"] .highlight .sb, [data-color-mode="light"] .highlight .sc, [data-color-mode="light"] .highlight .dl, [data-color-mode="light"] .highlight .sd, [data-color-mode="light"] .highlight .s1, [data-color-mode="light"] .highlight .s2, [data-color-mode="light"] .highlight .se, [data-color-mode="light"] .highlight .sh, [data-color-mode="light"] .highlight .si, [data-color-mode="light"] .highlight .sx, [data-color-mode="light"] .highlight .sr, [data-color-mode="light"] .highlight .ss {
      color: #0a3069;
    }
    [data-color-mode="light"] .highlight .na, [data-color-mode="light"] .highlight .nb, [data-color-mode="light"] .highlight .nc, [data-color-mode="light"] .highlight .nd, [data-color-mode="light"] .highlight .ne, [data-color-mode="light"] .highlight .nf, [data-color-mode="light"] .highlight .nl, [data-color-mode="light"] .highlight .nn, [data-color-mode="light"] .highlight .nt, [data-color-mode="light"] .highlight .nv, [data-color-mode="light"] .highlight .nx {
      color: #8250df;
    }
    [data-color-mode="light"] .highlight .o, [data-color-mode="light"] .highlight .ow, [data-color-mode="light"] .highlight .p, [data-color-mode="light"] .highlight .pi {
      color: #1f2328;
    }
    [data-color-mode="light"] .highlight .gh, [data-color-mode="light"] .highlight .gu {
      color: #0550ae; font-weight: 600;
    }

    /* Dark mode syntax (Dracula) */
    [data-color-mode="dark"] .highlight,
    [data-dark-theme="dark"][data-color-mode="auto"] .highlight {
      background: #282a36;
      border: 1px solid #44475a;
    }
    [data-color-mode="dark"] .highlight pre,
    [data-dark-theme="dark"][data-color-mode="auto"] .highlight pre {
      color: #f8f8f2;
    }
    [data-color-mode="dark"] .code-copy-btn,
    [data-dark-theme="dark"][data-color-mode="auto"] .code-copy-btn {
      border: 1px solid #44475a;
      background: #282a36;
      color: #f8f8f2;
    }
    [data-color-mode="dark"] .code-copy-btn:hover,
    [data-dark-theme="dark"][data-color-mode="auto"] .code-copy-btn:hover {
      background: #44475a;
    }
    [data-color-mode="dark"] .code-copy-btn.copied,
    [data-dark-theme="dark"][data-color-mode="auto"] .code-copy-btn.copied {
      color: #50fa7b;
    }
    /* Dracula: comments */
    [data-color-mode="dark"] .highlight .c, [data-color-mode="dark"] .highlight .c1, [data-color-mode="dark"] .highlight .cm, [data-color-mode="dark"] .highlight .cp, [data-color-mode="dark"] .highlight .cs {
      color: #6272a4; font-style: italic;
    }
    /* Dracula: keywords */
    [data-color-mode="dark"] .highlight .k, [data-color-mode="dark"] .highlight .kd, [data-color-mode="dark"] .highlight .kn, [data-color-mode="dark"] .highlight .kp, [data-color-mode="dark"] .highlight .kr, [data-color-mode="dark"] .highlight .kt, [data-color-mode="dark"] .highlight .kv {
      color: #ff79c6;
    }
    /* Dracula: constants, numbers */
    [data-color-mode="dark"] .highlight .kc, [data-color-mode="dark"] .highlight .mf, [data-color-mode="dark"] .highlight .mh, [data-color-mode="dark"] .highlight .mi, [data-color-mode="dark"] .highlight .mo, [data-color-mode="dark"] .highlight .il {
      color: #bd93f9;
    }
    /* Dracula: strings */
    [data-color-mode="dark"] .highlight .s, [data-color-mode="dark"] .highlight .sa, [data-color-mode="dark"] .highlight .sb, [data-color-mode="dark"] .highlight .sc, [data-color-mode="dark"] .highlight .dl, [data-color-mode="dark"] .highlight .sd, [data-color-mode="dark"] .highlight .s1, [data-color-mode="dark"] .highlight .s2, [data-color-mode="dark"] .highlight .se, [data-color-mode="dark"] .highlight .sh, [data-color-mode="dark"] .highlight .si, [data-color-mode="dark"] .highlight .sx, [data-color-mode="dark"] .highlight .sr, [data-color-mode="dark"] .highlight .ss {
      color: #f1fa8c;
    }
    /* Dracula: names, functions, classes */
    [data-color-mode="dark"] .highlight .na, [data-color-mode="dark"] .highlight .nb, [data-color-mode="dark"] .highlight .nc, [data-color-mode="dark"] .highlight .nd, [data-color-mode="dark"] .highlight .ne, [data-color-mode="dark"] .highlight .nf, [data-color-mode="dark"] .highlight .nl, [data-color-mode="dark"] .highlight .nn, [data-color-mode="dark"] .highlight .nt, [data-color-mode="dark"] .highlight .nv, [data-color-mode="dark"] .highlight .nx {
      color: #50fa7b;
    }
    /* Dracula: operators, punctuation */
    [data-color-mode="dark"] .highlight .o, [data-color-mode="dark"] .highlight .ow, [data-color-mode="dark"] .highlight .p, [data-color-mode="dark"] .highlight .pi {
      color: #f8f8f2;
    }
    /* Dracula: headings */
    [data-color-mode="dark"] .highlight .gh, [data-color-mode="dark"] .highlight .gu {
      color: #8be9fd; font-weight: 600;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
    <span id="theme-icon">&#9728;</span>
  </button>

  <article class="markdown-body">
    <div class="site-header" style="margin-bottom: 32px; padding-bottom: 16px; border-bottom: 2px solid #6366f1;">
      <a href="{{ '/' | relative_url }}">
        <h1>{{ site.title }}</h1>
      </a>
    </div>
    {{ content }}
  </article>

  {% include mermaid.html %}
  {% include lang-tabs.html %}

  <script>
    async function copyTextToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      var textArea = document.createElement('textarea');
      textArea.value = text;
      textArea.setAttribute('readonly', '');
      textArea.style.position = 'fixed';
      textArea.style.top = '-9999px';
      textArea.style.left = '-9999px';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();

      try {
        var successful = document.execCommand('copy');
        document.body.removeChild(textArea);
        if (!successful) {
          throw new Error('execCommand copy failed');
        }
      } catch (err) {
        document.body.removeChild(textArea);
        throw err;
      }
    }

    function getTheme() {
      return localStorage.getItem('theme') || 'auto';
    }

    function setTheme(theme) {
      const html = document.documentElement;
      localStorage.setItem('theme', theme);
      html.setAttribute('data-color-mode', theme === 'auto' ? 'auto' : theme);
      html.setAttribute('data-light-theme', 'light');
      html.setAttribute('data-dark-theme', 'dark');
      document.getElementById('theme-icon').innerHTML =
        theme === 'dark' ? '&#9790;' : theme === 'light' ? '&#9728;' : '&#9881;';
    }

    function toggleTheme() {
      const current = getTheme();
      const next = current === 'auto' ? 'light' : current === 'light' ? 'dark' : 'auto';
      setTheme(next);
    }

    setTheme(getTheme());

    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.highlight').forEach(function (block) {
        if (block.querySelector('.code-copy-btn')) return;

        var code = block.querySelector('code');
        if (!code) return;

        var button = document.createElement('button');
        button.className = 'code-copy-btn';
        button.type = 'button';
        button.textContent = '⧉';
        button.setAttribute('aria-label', 'Copy code');
        button.setAttribute('title', 'Copy code');

        button.addEventListener('click', async function () {
          try {
            await copyTextToClipboard(code.textContent);
            button.textContent = '✓';
            button.classList.add('copied');
            setTimeout(function () {
              button.textContent = '⧉';
              button.classList.remove('copied');
            }, 1500);
          } catch (err) {
            button.textContent = '!';
            setTimeout(function () {
              button.textContent = '⧉';
            }, 1500);
          }
        });

        block.insertBefore(button, block.firstChild);
      });
    });
  </script>
</body>
</html>
