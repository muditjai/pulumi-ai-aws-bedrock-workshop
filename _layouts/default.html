<!DOCTYPE html>
<html lang="en" data-color-mode="auto" data-light-theme="light" data-dark-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Primer/21.0.7/primer.css">
  <style>
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto;
      padding: 45px;
    }
    @media (max-width: 767px) {
      .markdown-body {
        padding: 15px;
      }
    }
    .site-header a {
      text-decoration: none;
      color: #6366f1;
    }
    .site-header a:hover {
      text-decoration: underline;
    }
    .site-header h1 {
      margin: 0;
      font-size: 2em;
    }
    .theme-toggle {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 100;
      background: var(--color-bg-default);
      border: 1px solid var(--color-border-default);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .highlight {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      margin: 1rem 0;
      position: relative;
    }
    .highlight pre {
      margin: 0;
      padding: 16px;
      padding-top: 44px;
      overflow-x: auto;
      background: transparent;
    }
    .code-copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 2;
      border: 1px solid var(--color-border-default, #d0d7de);
      background: var(--color-canvas-default, #ffffff);
      color: var(--color-fg-default, #1f2328);
      border-radius: 6px;
      width: 32px;
      height: 32px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
    }
    .code-copy-btn:hover {
      background: var(--color-canvas-subtle, #f6f8fa);
    }
    .code-copy-btn.copied {
      color: #1a7f37;
    }
    .highlight .c, .highlight .c1, .highlight .cm, .highlight .cp, .highlight .cs {
      color: #6e7781;
      font-style: italic;
    }
    .highlight .k, .highlight .kd, .highlight .kn, .highlight .kp, .highlight .kr, .highlight .kt, .highlight .kv {
      color: #cf222e;
    }
    .highlight .kc, .highlight .mf, .highlight .mh, .highlight .mi, .highlight .mo, .highlight .il {
      color: #0550ae;
    }
    .highlight .s, .highlight .sa, .highlight .sb, .highlight .sc, .highlight .dl, .highlight .sd, .highlight .s1, .highlight .s2, .highlight .se, .highlight .sh, .highlight .si, .highlight .sx, .highlight .sr, .highlight .ss {
      color: #0a3069;
    }
    .highlight .na, .highlight .nb, .highlight .nc, .highlight .nd, .highlight .ne, .highlight .nf, .highlight .nl, .highlight .nn, .highlight .nt, .highlight .nv, .highlight .nx {
      color: #8250df;
    }
    .highlight .o, .highlight .ow, .highlight .p, .highlight .pi {
      color: #1f2328;
    }
    .highlight .gh, .highlight .gu {
      color: #0550ae;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
    <span id="theme-icon">&#9728;</span>
  </button>

  <article class="markdown-body">
    <div class="site-header" style="margin-bottom: 32px; padding-bottom: 16px; border-bottom: 2px solid #6366f1;">
      <a href="{{ '/' | relative_url }}">
        <h1>{{ site.title }}</h1>
      </a>
    </div>
    {{ content }}
  </article>

  {% include mermaid.html %}
  {% include lang-tabs.html %}

  <script>
    async function copyTextToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      var textArea = document.createElement('textarea');
      textArea.value = text;
      textArea.setAttribute('readonly', '');
      textArea.style.position = 'fixed';
      textArea.style.top = '-9999px';
      textArea.style.left = '-9999px';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();

      try {
        var successful = document.execCommand('copy');
        document.body.removeChild(textArea);
        if (!successful) {
          throw new Error('execCommand copy failed');
        }
      } catch (err) {
        document.body.removeChild(textArea);
        throw err;
      }
    }

    function getTheme() {
      return localStorage.getItem('theme') || 'auto';
    }

    function setTheme(theme) {
      const html = document.documentElement;
      localStorage.setItem('theme', theme);
      html.setAttribute('data-color-mode', theme === 'auto' ? 'auto' : theme);
      html.setAttribute('data-light-theme', 'light');
      html.setAttribute('data-dark-theme', 'dark');
      document.getElementById('theme-icon').innerHTML =
        theme === 'dark' ? '&#9790;' : theme === 'light' ? '&#9728;' : '&#9881;';
    }

    function toggleTheme() {
      const current = getTheme();
      const next = current === 'auto' ? 'light' : current === 'light' ? 'dark' : 'auto';
      setTheme(next);
    }

    setTheme(getTheme());

    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.highlight').forEach(function (block) {
        if (block.querySelector('.code-copy-btn')) return;

        var code = block.querySelector('code');
        if (!code) return;

        var button = document.createElement('button');
        button.className = 'code-copy-btn';
        button.type = 'button';
        button.textContent = '⧉';
        button.setAttribute('aria-label', 'Copy code');
        button.setAttribute('title', 'Copy code');

        button.addEventListener('click', async function () {
          try {
            await copyTextToClipboard(code.textContent);
            button.textContent = '✓';
            button.classList.add('copied');
            setTimeout(function () {
              button.textContent = '⧉';
              button.classList.remove('copied');
            }, 1500);
          } catch (err) {
            button.textContent = '!';
            setTimeout(function () {
              button.textContent = '⧉';
            }, 1500);
          }
        });

        block.insertBefore(button, block.firstChild);
      });
    });
  </script>
</body>
</html>
